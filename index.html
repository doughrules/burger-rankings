<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🍔 Burger Power Rankings</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700;1,900&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --bg-cream: #f0e6d0;
      --bg-dark: #3a1f00;
      --gold: #d4a017;
      --gold-dark: #b8860b;
      --gold-muted: #c8a96e;
      --brown-text: #5c3a1e;
      --brown-dark: #3a1f00;
      --card-bg: #e8d9be;
      --card-border: #c8a96e;
      --input-bg: #f5ece0;
      --error: #c0392b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', Georgia, sans-serif; background-color: var(--bg-cream); color: var(--brown-text); min-height: 100vh; }

    .hero { position: relative; width: 100%; overflow: hidden; background-color: var(--bg-dark); min-height: 200px; display: flex; align-items: flex-end; }
    .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 35%; opacity: 0.82; }
    .hero-title { position: relative; z-index: 1; padding: 20px 20px 18px; font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 900; font-size: 2.1rem; color: var(--gold); text-shadow: 1px 3px 10px rgba(0,0,0,0.65); line-height: 1.1; }
    .hero-sub { background-color: var(--bg-dark); text-align: center; padding: 10px 16px; letter-spacing: 0.18em; font-size: 0.72rem; color: var(--gold-muted); text-transform: uppercase; display: flex; justify-content: center; gap: 16px; }

    .nav { display: flex; gap: 10px; padding: 14px 16px; background-color: var(--bg-cream); border-bottom: 1px solid var(--card-border); }
    .nav-btn { flex: 1; padding: 12px 8px; border-radius: 14px; border: 2px solid var(--card-border); background: transparent; color: var(--brown-dark); font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; text-align: center; transition: all 0.15s; }
    .nav-btn.active { background-color: var(--gold); border-color: var(--gold); }
    .nav-btn.refresh { flex: 0 0 44px; padding: 12px 0; }

    .content { max-width: 680px; margin: 0 auto; padding: 20px 16px 40px; }

    .pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .pill { padding: 7px 16px; border-radius: 999px; border: 2px solid var(--card-border); background: transparent; color: var(--brown-dark); font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; }
    .pill.active { background-color: var(--gold); border-color: var(--gold); }

    .card { background-color: var(--card-bg); border: 2px solid var(--card-border); border-radius: 16px; padding: 18px; margin-bottom: 12px; }
    .card.top { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold-muted), 0 6px 24px rgba(180,130,0,0.15); }
    .card-header { display: flex; align-items: flex-start; gap: 14px; }
    .rank-badge { min-width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.95rem; flex-shrink: 0; }
    .burger-name { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 700; font-size: 1.2rem; color: var(--gold-dark); }
    .burger-meta { font-size: 0.8rem; color: var(--brown-text); opacity: 0.75; margin-top: 2px; }
    .avg-score { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--gold); line-height: 1; }
    .avg-label { font-size: 0.7rem; color: var(--gold-muted); margin-top: 2px; }
    .criteria-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .chip { background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 3px 10px; font-size: 0.75rem; }
    .chip span { color: var(--gold-dark); font-weight: 700; }
    .divider { border: none; border-top: 1px solid var(--card-border); margin: 14px 0; }

    .btn { padding: 11px 20px; border-radius: 14px; border: none; background: var(--gold); color: var(--brown-dark); font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: background 0.15s; }
    .btn:hover { background: var(--gold-dark); }
    .btn.secondary { background: transparent; border: 2px solid var(--card-border); color: var(--brown-dark); }
    .btn.secondary:hover { border-color: var(--gold); }
    .btn.full { width: 100%; padding: 14px; font-size: 1rem; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .inp { width: 100%; padding: 13px 16px; border-radius: 14px; border: 2px solid var(--card-border); background: var(--input-bg); font-size: 0.95rem; font-family: 'Lato', sans-serif; color: var(--brown-dark); outline: none; transition: border-color 0.15s; }
    .inp:focus { border-color: var(--gold); }
    .inp::placeholder { color: var(--gold-muted); }
    input[type="date"].inp::-webkit-calendar-picker-indicator { filter: invert(0.4) sepia(1) saturate(3) hue-rotate(5deg); cursor: pointer; }

    label.field-label { display: block; font-weight: 700; font-size: 0.78rem; letter-spacing: 0.07em; text-transform: uppercase; color: var(--brown-dark); margin-bottom: 7px; }
    .field { margin-bottom: 16px; }
    .section-title { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 700; font-size: 1.5rem; color: var(--brown-dark); margin-bottom: 18px; }

    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.2); white-space: nowrap; }
    .stars { display: flex; gap: 3px; cursor: pointer; }

    .criteria-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-top: 1px solid var(--card-border); }
    .criteria-row:last-of-type { border-bottom: 1px solid var(--card-border); margin-bottom: 16px; }
    .criteria-label { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .criteria-sub { font-size: 0.75rem; color: var(--brown-text); opacity: 0.65; margin-top: 2px; }

    .burger-select-item { background: var(--card-bg); border: 2px solid var(--card-border); border-radius: 14px; padding: 14px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
    .burger-select-item:hover { border-color: var(--gold); }

    .fullscreen-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; text-align: center; padding: 32px; background: var(--bg-cream); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SUPABASE_URL = "https://wjdtpqeqahxxpdutagye.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqZHRwcWVxYWh4eHBkdXRhZ3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDg0NTEsImV4cCI6MjA4ODYyNDQ1MX0.YZNAKbckFJ0VTQ2aTnC2l8uWlbjAPpBX_zYNnd55aVs";
    const HEADERS = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` };
    const TABLE_URL = `${SUPABASE_URL}/rest/v1/Burgers`;

    const CRITERIA = ["Patty", "Bun", "Toppings & Sauce", "Value", "Vibes"];
    const CRITERIA_DESC = {
      "Patty": "Cook, crust, juiciness, flavour",
      "Bun": "Texture, freshness, ratio",
      "Toppings & Sauce": "Balance, quality, creativity, sauce",
      "Value": "Worth the price?",
      "Vibes": "Atmosphere, service, would return?"
    };
    const CATS = ["All", "Smash", "Classic", "Gourmet", "Fast Food", "Veggie"];

    const BurgerIcon = ({ filled, half, size = 26 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
        <ellipse cx="12" cy="6.5" rx="9" ry="4" fill={filled || half ? "#d4a017" : "#d9c9a8"}/>
        <rect x="3" y="8" width="18" height="2.5" rx="1.25" fill={filled || half ? "#b8860b" : "#c8b890"}/>
        <rect x="2" y="11" width="20" height="3" rx="1.5" fill={filled || half ? "#c8a96e" : "#d9c9a8"}/>
        <rect x="3" y="15" width="18" height="3" rx="1.5" fill={filled || half ? "#d4a017" : "#d9c9a8"}/>
        <rect x="3" y="18" width="18" height="2.5" rx="1.25" fill={filled || half ? "#c8a96e" : "#d9c9a8"}/>
        {half && <rect x="12" y="3" width="10" height="18" fill="rgba(240,230,208,0.6)"/>}
      </svg>
    );

    const BurgerRating = ({ value = 0, onChange, size = 26 }) => {
      const [hover, setHover] = useState(null);
      const display = hover ?? value;
      return (
        <div className="stars">
          {[1,2,3,4,5].map(star => {
            const full = display >= star;
            const half = !full && display >= star - 0.5;
            return (
              <div key={star}
                onMouseMove={onChange ? e => { const r = e.currentTarget.getBoundingClientRect(); setHover(e.clientX - r.left < r.width/2 ? star-0.5 : star); } : undefined}
                onMouseLeave={onChange ? () => setHover(null) : undefined}
                onClick={onChange ? () => onChange(hover ?? value) : undefined}>
                <BurgerIcon filled={full} half={half} size={size}/>
              </div>
            );
          })}
        </div>
      );
    };

    function App() {
      const [burgers, setBurgers] = useState([]);
      const [rowId, setRowId] = useState(null);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState(null);
      const [joined, setJoined] = useState(false);
      const [joinInput, setJoinInput] = useState("");
      const [view, setView] = useState("rankings");
      const [selectedBurger, setSelectedBurger] = useState(null);
      const [raterName, setRaterName] = useState("");
      const [ratings, setRatings] = useState({});
      const [orderNote, setOrderNote] = useState("");
      const [visitDate, setVisitDate] = useState(new Date().toISOString().split("T")[0]);
      const [newBurger, setNewBurger] = useState({ name:"", restaurant:"", category:"Classic", notes:"" });
      const [filter, setFilter] = useState("All");
      const [toast, setToast] = useState(null);

      const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

      const fetchData = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const res = await fetch(`${TABLE_URL}?select=*&limit=1`, { headers: HEADERS });
          if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
          const rows = await res.json();
          if (rows.length > 0) {
            setRowId(rows[0].id);
            setBurgers(rows[0].data?.burgers || []);
          } else {
            const ins = await fetch(TABLE_URL, {
              method: "POST",
              headers: { ...HEADERS, "Prefer": "return=representation" },
              body: JSON.stringify({ data: { burgers: [] } })
            });
            const newRows = await ins.json();
            setRowId(newRows[0].id);
            setBurgers([]);
          }
        } catch(e) { setError(e.message); }
        setLoading(false);
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);

      const saveData = async (newBurgers) => {
        setSaving(true);
        try {
          const res = await fetch(`${TABLE_URL}?id=eq.${rowId}`, {
            method: "PATCH",
            headers: { ...HEADERS, "Prefer": "return=representation" },
            body: JSON.stringify({ data: { burgers: newBurgers } })
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          setBurgers(newBurgers);
          setSaving(false);
          return true;
        } catch(e) { showToast("Save failed: "+e.message,"error"); setSaving(false); return false; }
      };

      const avgRating = b => {
        if (!b.ratings?.length) return null;
        const total = b.ratings.reduce((s,r) => s + CRITERIA.reduce((a,c)=>a+(r.scores[c]||0),0)/CRITERIA.length, 0);
        return (total/b.ratings.length).toFixed(1);
      };

      const sorted = [...burgers]
        .filter(b => filter==="All" || b.category===filter)
        .map(b => ({...b, avg: avgRating(b)}))
        .sort((a,b) => (parseFloat(b.avg)||0)-(parseFloat(a.avg)||0));

      const handleRate = async () => {
        if (!raterName.trim()) return showToast("Enter your name!","error");
        if (CRITERIA.some(c=>!ratings[c])) return showToast("Rate all 5 criteria!","error");
        const updated = burgers.map(b => b.id!==selectedBurger.id ? b : {
          ...b,
          lastVisit: visitDate,
          ratings: [
            ...(b.ratings||[]).filter(r=>r.name.toLowerCase()!==raterName.toLowerCase()),
            { name:raterName, scores:ratings, orderNote, visitDate, date:new Date().toISOString() }
          ]
        });
        if (await saveData(updated)) {
          showToast("Rating saved! 🍔");
          setView("rankings");
          setRatings({});
          setOrderNote("");
          setVisitDate(new Date().toISOString().split("T")[0]);
          setSelectedBurger(null);
        }
      };

      const handleAdd = async () => {
        if (!newBurger.name.trim()||!newBurger.restaurant.trim()) return showToast("Name & restaurant required!","error");
        const updated = [...burgers, {...newBurger, id:Date.now().toString(), ratings:[], addedDate:new Date().toISOString().split("T")[0]}];
        if (await saveData(updated)) { showToast("Burger added! 🍔"); setNewBurger({name:"",restaurant:"",category:"Classic",notes:""}); setView("rankings"); }
      };

      const rankColors = ["#d4a017","#9ca3af","#cd7f32"];
      const rankEmojis = ["🥇","🥈","🥉"];

      // JOIN SCREEN
      if (!joined) return (
        <div style={{minHeight:"100vh",background:"var(--bg-cream)",display:"flex",flexDirection:"column"}}>
          <div className="hero" style={{minHeight:220}}>
            <img src="images/burger-hero.jpg" alt="Burger Power Rankings" onError={e=>{e.target.style.display='none';}}/>
            <div className="hero-title">Burger Power Rankings</div>
          </div>
          <div className="hero-sub">
            <span>The Definitive Leaderboard</span>
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",gap:12}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:"1.7rem",color:"var(--brown-dark)",textAlign:"center"}}>
              Nice To Meat You! 🍔
            </div>
            <div style={{color:"var(--brown-text)",fontSize:"0.95rem",marginBottom:8,opacity:0.8}}>
              Enter your name to join the crawl
            </div>
            <div style={{display:"flex",gap:10,width:"100%",maxWidth:400}}>
              <input className="inp" value={joinInput} onChange={e=>setJoinInput(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter"&&joinInput.trim()){setRaterName(joinInput.trim());setJoined(true);}}}
                placeholder="Your name…" style={{flex:1}}/>
              <button className="btn" style={{padding:"13px 20px",fontSize:"1.1rem",flexShrink:0}}
                onClick={()=>{if(joinInput.trim()){setRaterName(joinInput.trim());setJoined(true);}}}>→</button>
            </div>
            <div style={{fontSize:"0.78rem",color:"var(--brown-text)",opacity:0.55,marginTop:4}}>
              ⚠️ Ratings are visible to all participants
            </div>
          </div>
        </div>
      );

      if (loading) return (
        <div className="fullscreen-msg">
          <div style={{fontSize:48}}>🍔</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:22,color:"var(--brown-dark)"}}>Loading burgers…</div>
        </div>
      );

      if (error) return (
        <div className="fullscreen-msg">
          <div style={{fontSize:48}}>⚠️</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:20,color:"var(--brown-dark)"}}>Couldn't connect</div>
          <div style={{color:"var(--brown-text)",fontSize:13,maxWidth:320,opacity:0.75}}>{error}</div>
          <button className="btn" onClick={fetchData}>Retry</button>
        </div>
      );

      return (
        <div style={{minHeight:"100vh"}}>
          {toast && (
            <div className="toast" style={{background:toast.type==="error"?"#c0392b":"#3a1f00",color:"#f0e6d0"}}>
              {toast.msg}
            </div>
          )}

          <div className="hero">
            <img src="images/burger-hero.jpg" alt="Burger Power Rankings" onError={e=>{e.target.style.display='none';}}/>
            <div className="hero-title">Burger Power Rankings</div>
          </div>
          <div className="hero-sub">
            <span>Hey {raterName}</span>
            <span style={{opacity:0.4}}>·</span>
            <span>{burgers.length} burger{burgers.length!==1?"s":""} ranked</span>
          </div>

          <div className="nav">
            {[["rankings","🏆 Rankings"],["rate","⭐ Rate"],["add","➕ Add"]].map(([v,label])=>(
              <button key={v} className={`nav-btn${view===v?" active":""}`} onClick={()=>setView(v)}>{label}</button>
            ))}
            <button className="nav-btn refresh" onClick={fetchData} title="Refresh">🔄</button>
          </div>

          <div className="content">

            {/* RANKINGS */}
            {view==="rankings" && (
              <div>
                <div className="pills">
                  {CATS.map(c=>(
                    <button key={c} className={`pill${filter===c?" active":""}`} onClick={()=>setFilter(c)}>{c}</button>
                  ))}
                </div>
                {sorted.length===0
                  ? <div style={{textAlign:"center",padding:48,color:"var(--brown-text)",opacity:0.6}}>
                      <div style={{fontSize:48,marginBottom:12}}>🍔</div>
                      <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:18}}>No burgers yet — add one!</div>
                    </div>
                  : sorted.map((burger,idx)=>(
                    <div key={burger.id} className={`card${idx===0?" top":""}`}>
                      <div className="card-header">
                        <div className="rank-badge" style={{background:idx<3?rankColors[idx]:"var(--card-border)",color:idx<3?"#fff":"var(--brown-dark)"}}>
                          {idx<3?rankEmojis[idx]:`#${idx+1}`}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                            <div>
                              <div className="burger-name">{burger.name}</div>
                              <div className="burger-meta">{burger.restaurant} · {burger.category}</div>
                              {burger.lastVisit && <div className="burger-meta">Last visit: {burger.lastVisit}</div>}
                            </div>
                            <div style={{textAlign:"right",flexShrink:0}}>
                              {burger.avg
                                ? <><div className="avg-score">{burger.avg}</div><div className="avg-label">{burger.ratings?.length} rating{burger.ratings?.length!==1?"s":""}</div></>
                                : <div style={{color:"var(--gold-muted)",fontSize:12,paddingTop:8}}>Unrated</div>}
                            </div>
                          </div>
                          {burger.avg && <div style={{marginTop:8}}><BurgerRating value={parseFloat(burger.avg)} size={20}/></div>}
                          {burger.ratings?.length>0 && (
                            <div className="criteria-chips">
                              {CRITERIA.map(c=>{
                                const avg=burger.ratings.reduce((s,r)=>s+(r.scores[c]||0),0)/burger.ratings.length;
                                return <div key={c} className="chip">{c} <span>{avg.toFixed(1)}</span></div>;
                              })}
                            </div>
                          )}
                        </div>
                      </div>
                      <hr className="divider"/>
                      <button className="btn" style={{fontSize:"0.82rem",padding:"8px 16px"}}
                        onClick={()=>{setSelectedBurger(burger);setView("rate");}}>Rate this 🍔</button>
                    </div>
                  ))
                }
              </div>
            )}

            {/* RATE */}
            {view==="rate" && (
              <div>
                <div className="section-title">⭐ Rate a Burger</div>
                {!selectedBurger
                  ? <div>
                      {burgers.length===0
                        ? <div style={{color:"var(--brown-text)",opacity:0.6,textAlign:"center",padding:32}}>No burgers added yet!</div>
                        : burgers.map(b=>(
                          <div key={b.id} className="burger-select-item" onClick={()=>setSelectedBurger(b)}>
                            <div className="burger-name" style={{fontSize:"1.05rem"}}>{b.name}</div>
                            <div className="burger-meta">{b.restaurant} · {b.category}</div>
                          </div>
                        ))
                      }
                    </div>
                  : <div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                        <div>
                          <div className="burger-name" style={{fontSize:"1.3rem"}}>{selectedBurger.name}</div>
                          <div className="burger-meta">{selectedBurger.restaurant}</div>
                        </div>
                        <button className="btn secondary" style={{fontSize:"0.82rem",padding:"8px 14px"}}
                          onClick={()=>setSelectedBurger(null)}>← Back</button>
                      </div>

                      {/* Criteria */}
                      <div>
                        {CRITERIA.map(c=>(
                          <div key={c} className="criteria-row">
                            <div>
                              <div className="criteria-label">
                                {c}{ratings[c]?<span style={{color:"var(--gold-muted)",fontWeight:400,fontSize:"0.72rem",textTransform:"none",letterSpacing:0}}> ({ratings[c]}/5)</span>:""}
                              </div>
                              <div className="criteria-sub">{CRITERIA_DESC[c]}</div>
                            </div>
                            <BurgerRating value={ratings[c]||0} onChange={v=>setRatings(r=>({...r,[c]:v}))} size={28}/>
                          </div>
                        ))}
                      </div>

                      {/* What did you order */}
                      <div className="field" style={{marginTop:20}}>
                        <label className="field-label">What did you order?</label>
                        <input className="inp" value={orderNote} onChange={e=>setOrderNote(e.target.value)}
                          placeholder="e.g. Smash burger w/ bacon…"/>
                      </div>

                      {/* Visit date */}
                      <div className="field">
                        <label className="field-label">Last Visit</label>
                        <input type="date" className="inp" value={visitDate} onChange={e=>setVisitDate(e.target.value)}/>
                      </div>

                      <button className="btn full" onClick={handleRate} disabled={saving}>
                        {saving?"Saving…":"Submit Rating 🍔"}
                      </button>
                    </div>
                }
              </div>
            )}

            {/* ADD */}
            {view==="add" && (
              <div>
                <div className="section-title">➕ New Burger</div>
                {[["Burger Name *","name","e.g. Double Smash"],["Restaurant *","restaurant","e.g. Five Guys"],["Notes","notes","e.g. Get the special sauce"]].map(([label,field,ph])=>(
                  <div key={field} className="field">
                    <label className="field-label">{label}</label>
                    <input className="inp" value={newBurger[field]} onChange={e=>setNewBurger(b=>({...b,[field]:e.target.value}))} placeholder={ph}/>
                  </div>
                ))}
                <div className="field">
                  <label className="field-label">Category</label>
                  <select className="inp" value={newBurger.category} onChange={e=>setNewBurger(b=>({...b,category:e.target.value}))}>
                    {CATS.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
                <button className="btn full" onClick={handleAdd} disabled={saving}>
                  {saving?"Saving…":"Add Burger 🍔"}
                </button>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
